        def modeButton = rect('mode_button', intValue('MODE_BUTTON_X'), intValue('MODE_BUTTON_Y'), intValue('BUTTON_SIZE'), intValue('BUTTON_SIZE'))
        def prevButton = rect('standard_prev_button', intValue('STANDARD_PREV_X'), intValue('STANDARD_BUTTON_Y'), intValue('BUTTON_SIZE'), intValue('BUTTON_SIZE'))
        def nextButton = rect('standard_next_button', intValue('STANDARD_NEXT_X'), intValue('STANDARD_BUTTON_Y'), intValue('BUTTON_SIZE'), intValue('BUTTON_SIZE'))
        def designButton = rect('design_button', intValue('DESIGN_BUTTON_X'), intValue('DESIGN_BUTTON_Y'), intValue('DESIGN_BUTTON_WIDTH'), intValue('DESIGN_BUTTON_HEIGHT'))
        [modeButton, prevButton, nextButton, designButton].each { assertInside(outputZone, it) }
        assertNoOverlap('output control', [modeButton, prevButton, outputSlot, nextButton, designButton])
        assertNear(
