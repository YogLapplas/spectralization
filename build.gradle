        def exampleSource = opticalExampleValidatorSourceFile.text
        def solverSource = profileLanePowerSolverSourceFile.text
        def expect = { boolean condition, String message ->
            if (!condition) {
                throw new GradleException(message)
            }
        }

        [
                'splitter_lens_splitter',
                'lens_aperture_clip',
                'fiber_radius_coupling',
                'feedback_fiber_radius_loss',
                'parallel_fiber_same_endpoint',
                'beam_expander_fiber_coupling'
        ].each { testName ->
            expect(
                    exampleSource.contains("Commands.literal(\"${testName}\")"),
                    "opticaltest must keep the passive optics regression command ${testName}."
            )
        }

        expect(
                (exampleSource =~ /if\s*\(\s*output\.power\(\)\s*>\s*SOURCE_POWER\s*\+\s*POWER_TOLERANCE\s*\)/).find(),
