<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Spectralization UI Layout Editor</title>
<style>
  :root {
    --primary: #66CCFF;
    --bg: #05080c;
    --panel: #0b1520;
    --panel2: #101f2c;
    --text: #dff6ff;
    --muted: #7fa9ba;
    --warn: #ffb86c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #0d1720 0%, #020508 75%, #000 100%);
    color: var(--text);
    font-family: Consolas, "Courier New", monospace;
    overflow: hidden;
  }
  body {
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    grid-template-rows: 100vh;
  }
  aside, main {
    min-width: 0;
    min-height: 0;
  }
  .left, .right {
    background: rgba(4, 12, 20, 0.92);
    border-color: rgba(102, 204, 255, 0.25);
    padding: 12px;
    overflow: auto;
  }
  .left { border-right: 1px solid rgba(102, 204, 255, 0.25); }
  .right { border-left: 1px solid rgba(102, 204, 255, 0.25); }
  .center {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    padding: 20px;
  }
  h1, h2 {
    margin: 0 0 10px;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--primary);
  }
  h2 {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text);
    border-bottom: 1px solid rgba(102,204,255,0.2);
    padding-bottom: 5px;
  }
  .canvas-shell {
    padding: 18px;
    background: rgba(0, 15, 30, 0.48);
    border: 1px solid rgba(102, 204, 255, 0.24);
    box-shadow: 0 0 35px rgba(102,204,255,0.10), inset 0 0 22px rgba(102,204,255,0.06);
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    background: #05080c;
    cursor: crosshair;
  }
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  button, input, select, textarea {
    font-family: inherit;
    background: #07111a;
    color: var(--text);
    border: 1px solid rgba(102,204,255,0.35);
    outline: none;
  }
  button {
    padding: 6px 8px;
    cursor: pointer;
    margin: 3px 2px;
  }
  button:hover { border-color: rgba(102,204,255,0.9); background: rgba(102,204,255,0.12); }
  input, select {
    height: 26px;
    padding: 3px 5px;
  }
  textarea {
    width: 100%;
    height: 235px;
    resize: vertical;
    padding: 8px;
    line-height: 1.35;
    font-size: 12px;
  }
  .row {
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 6px;
    align-items: center;
    margin: 7px 0;
    font-size: 12px;
  }
  .row label { color: var(--muted); }
  .quad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .quad input { width: 100%; }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }
  .component-list {
    border: 1px solid rgba(102,204,255,0.22);
    background: rgba(0,0,0,0.25);
    max-height: 42vh;
    overflow: auto;
  }
  .component-item {
    padding: 7px 8px;
    border-bottom: 1px solid rgba(102,204,255,0.12);
    cursor: pointer;
    font-size: 12px;
  }
  .component-item:hover { background: rgba(102,204,255,0.08); }
  .component-item.selected {
    background: rgba(102,204,255,0.18);
    color: #fff;
  }
  .meta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 3px;
  }
  .status {
    color: var(--muted);
    font-size: 12px;
    margin-top: 8px;
    line-height: 1.45;
  }
  .checkbox-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin: 8px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .checkbox-row input { height: auto; }
  .pill {
    display: inline-block;
    color: var(--primary);
    border: 1px solid rgba(102,204,255,0.3);
    padding: 2px 5px;
    margin: 2px;
    font-size: 11px;
  }
</style>
</head>
<body>
<aside class="left">
  <h1>SPECTRALIZATION UI EDITOR</h1>
  <div class="status">
    拖动 box 调位置；拖右下角调整大小；方向键微调。坐标单位就是 Minecraft GUI 逻辑像素。
  </div>

  <h2>工具</h2>
  <div class="toolbar">
    <button onclick="addComponent('panel')">+ Panel</button>
    <button onclick="addComponent('button')">+ Button</button>
    <button onclick="addComponent('slot')">+ Slot</button>
    <button onclick="addComponent('readout')">+ Readout</button>
    <button onclick="duplicateSelected()">Duplicate</button>
    <button onclick="deleteSelected()">Delete</button>
  </div>

  <div class="checkbox-row">
    <input id="snap" type="checkbox" checked>
    <label for="snap">Snap grid</label>
    <input id="gridSize" type="number" value="2" min="1" max="16" style="width:52px">
  </div>
  <div class="checkbox-row">
    <input id="showGrid" type="checkbox" checked>
    <label for="showGrid">Show grid</label>
    <input id="showArt" type="checkbox" checked>
    <label for="showArt">Show HUD art</label>
  </div>
  <div class="row"><label>Screen</label>
    <div class="quad">
      <input id="layoutW" type="number" value="256" min="64" max="512" onchange="updateLayoutFromInputs()">
      <input id="layoutH" type="number" value="190" min="64" max="384" onchange="updateLayoutFromInputs()">
      <button onclick="fitLayoutToComponents()">Fit</button>
      <button onclick="setLayoutSize(256, 216)">256x216</button>
    </div>
  </div>

  <h2>组件列表</h2>
  <div id="componentList" class="component-list"></div>

  <h2>快捷键</h2>
  <div class="status">
    <span class="pill">Click</span> 选中<br>
    <span class="pill">Drag</span> 移动<br>
    <span class="pill">SE handle</span> 改大小<br>
    <span class="pill">Arrow</span> 移动 1px<br>
    <span class="pill">Shift+Arrow</span> 移动 8px<br>
    <span class="pill">Del</span> 删除<br>
  </div>
</aside>

<main class="center">
  <div class="canvas-shell">
    <canvas id="canvas" width="256" height="190"></canvas>
    <div class="hint" id="cursorHint">x=0 y=0</div>
  </div>
</main>

<aside class="right">
  <h1>属性</h1>
  <div id="noSelection" class="status">未选中组件。</div>
  <div id="props" style="display:none">
    <div class="row"><label>ID</label><input id="propId" oninput="updateSelectedFromInputs()"></div>
    <div class="row"><label>Type</label>
      <select id="propType" onchange="updateSelectedFromInputs()">
        <option>panel</option>
        <option>button</option>
        <option>slot</option>
        <option>readout</option>
        <option>chart</option>
        <option>label</option>
        <option>custom</option>
      </select>
    </div>
    <div class="row"><label>Label</label><input id="propLabel" oninput="updateSelectedFromInputs()"></div>
    <div class="row"><label>Data</label><input id="propData" oninput="updateSelectedFromInputs()" placeholder="menu data / field"></div>
    <div class="row"><label>Rect</label>
      <div class="quad">
        <input id="propX" type="number" oninput="updateSelectedFromInputs()">
        <input id="propY" type="number" oninput="updateSelectedFromInputs()">
        <input id="propW" type="number" oninput="updateSelectedFromInputs()">
        <input id="propH" type="number" oninput="updateSelectedFromInputs()">
      </div>
    </div>
    <div class="row"><label>Color</label><input id="propColor" oninput="updateSelectedFromInputs()" placeholder="#66CCFF"></div>
  </div>

  <h2>导出</h2>
  <div class="toolbar">
    <button onclick="exportJSON()">JSON</button>
    <button onclick="exportJavaConstants()">Java constants</button>
    <button onclick="exportJavaRects()">Java Rect map</button>
    <button onclick="copyExport()">Copy</button>
  </div>
  <textarea id="exportBox" spellcheck="false"></textarea>

  <h2>保存 / 导入</h2>
  <div class="toolbar">
    <button onclick="saveLocal()">Save local</button>
    <button onclick="loadLocal()">Load local</button>
    <button onclick="importJSON()">Import JSON</button>
    <button onclick="document.getElementById('importFile').click()">Import file</button>
    <input id="importFile" type="file" accept=".json,application/json" style="display:none" onchange="importJSONFile(event)">
    <button onclick="resetDefault()">Reset</button>
  </div>
  <div class="status" id="status">Ready.</div>
</aside>

<script>
"use strict";

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const cursorHint = document.getElementById("cursorHint");

let layoutWidth = 256;
let layoutHeight = 190;
let components = defaultComponents();
let selectedId = "root_panel";
let mouse = { x: -1, y: -1 };
let drag = null;

function defaultComponents() {
  return [
    { id: "root_panel", type: "panel", label: "ROOT", x: 8, y: 7, w: 240, h: 176, color: "#66CCFF", data: "" },
    { id: "title_bar", type: "panel", label: "PHOTOTHERMAL SMELTER", x: 12, y: 11, w: 232, h: 20, color: "#66CCFF", data: "machineName" },
    { id: "input_section", type: "panel", label: "INPUT", x: 14, y: 38, w: 62, h: 120, color: "#66CCFF", data: "" },
    { id: "slot_fuel", type: "slot", label: "F", x: 20, y: 51, w: 18, h: 18, color: "#66CCFF", data: "fuelSlot" },
    { id: "slot_light", type: "slot", label: "L", x: 20, y: 78, w: 18, h: 18, color: "#66CCFF", data: "incomingSP" },
    { id: "slot_output", type: "slot", label: "O", x: 20, y: 105, w: 18, h: 18, color: "#66CCFF", data: "outputSlot" },
    { id: "core_section", type: "panel", label: "CORE", x: 82, y: 38, w: 80, h: 120, color: "#66CCFF", data: "heat/progress" },
    { id: "machine_core", type: "custom", label: "CORE ART", x: 98, y: 58, w: 48, h: 64, color: "#FFB86C", data: "heat" },
    { id: "process_bar", type: "readout", label: "PROCESS", x: 93, y: 132, w: 58, h: 7, color: "#66CCFF", data: "progress/maxProgress" },
    { id: "readout_section", type: "panel", label: "READOUT", x: 168, y: 38, w: 70, h: 120, color: "#66CCFF", data: "" },
    { id: "readout_sp", type: "readout", label: "SP", x: 177, y: 49, w: 47, h: 12, color: "#66CCFF", data: "incomingSP" },
    { id: "readout_boost", type: "readout", label: "BOOST", x: 177, y: 65, w: 47, h: 12, color: "#7CFFB2", data: "lightBoostPercent" },
    { id: "readout_fet", type: "readout", label: "FE/t", x: 177, y: 81, w: 47, h: 12, color: "#DDF6FF", data: "fePerTick" },
    { id: "energy_bar", type: "readout", label: "ENERGY", x: 177, y: 115, w: 47, h: 6, color: "#66CCFF", data: "energy/maxEnergy" },
    { id: "heat_bar", type: "readout", label: "HEAT", x: 177, y: 138, w: 47, h: 6, color: "#FFB86C", data: "heat/maxHeat" },
    { id: "btn_auto_eject", type: "button", label: "AUTO ON", x: 15, y: 164, w: 58, h: 15, color: "#66CCFF", data: "autoEject" },
    { id: "btn_mode", type: "button", label: "HEAT", x: 78, y: 164, w: 48, h: 15, color: "#66CCFF", data: "mode" },
    { id: "diagnostic_line", type: "label", label: "LIGHT BOOST STABLE", x: 134, y: 164, w: 106, h: 15, color: "#7CFFB2", data: "warning" }
  ];
}

function getSelected() {
  return components.find(c => c.id === selectedId) || null;
}

function snap(v) {
  const enabled = document.getElementById("snap").checked;
  if (!enabled) return Math.round(v);
  const g = Math.max(1, parseInt(document.getElementById("gridSize").value || "2", 10));
  return Math.round(v / g) * g;
}

function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: Math.floor((e.clientX - r.left) * layoutWidth / r.width),
    y: Math.floor((e.clientY - r.top) * layoutHeight / r.height)
  };
}

canvas.addEventListener("mousemove", e => {
  mouse = canvasPos(e);
  cursorHint.textContent = "x=" + mouse.x + " y=" + mouse.y;

  if (drag) {
    const c = getSelected();
    if (!c) return;

    if (drag.mode === "move") {
      c.x = clamp(snap(mouse.x - drag.dx), 0, layoutWidth - c.w);
      c.y = clamp(snap(mouse.y - drag.dy), 0, layoutHeight - c.h);
    } else if (drag.mode === "resize") {
      c.w = clamp(snap(mouse.x - c.x), 4, layoutWidth - c.x);
      c.h = clamp(snap(mouse.y - c.y), 4, layoutHeight - c.y);
    }
    syncInputsFromSelected();
    renderList();
    draw();
  } else {
    draw();
  }
});

canvas.addEventListener("mouseleave", () => {
  mouse = { x: -1, y: -1 };
  cursorHint.textContent = "x=- y=-";
  draw();
});

canvas.addEventListener("mousedown", e => {
  const p = canvasPos(e);
  const hit = hitTest(p.x, p.y);
  if (!hit) {
    selectedId = null;
    syncInputsFromSelected();
    renderList();
    draw();
    return;
  }

  selectedId = hit.id;
  const c = getSelected();
  const nearSE = p.x >= c.x + c.w - 6 && p.y >= c.y + c.h - 6;
  drag = {
    mode: nearSE ? "resize" : "move",
    dx: p.x - c.x,
    dy: p.y - c.y
  };
  syncInputsFromSelected();
  renderList();
  draw();
});

window.addEventListener("mouseup", () => { drag = null; });

window.addEventListener("keydown", e => {
  const c = getSelected();
  if (!c) return;

  if (e.key === "Delete") {
    deleteSelected();
    e.preventDefault();
    return;
  }

  const step = e.shiftKey ? 8 : 1;
  let changed = true;

  if (e.key === "ArrowLeft") c.x = clamp(c.x - step, 0, layoutWidth - c.w);
  else if (e.key === "ArrowRight") c.x = clamp(c.x + step, 0, layoutWidth - c.w);
  else if (e.key === "ArrowUp") c.y = clamp(c.y - step, 0, layoutHeight - c.h);
  else if (e.key === "ArrowDown") c.y = clamp(c.y + step, 0, layoutHeight - c.h);
  else changed = false;

  if (changed) {
    syncInputsFromSelected();
    renderList();
    draw();
    e.preventDefault();
  }
});

function hitTest(x, y) {
  for (let i = components.length - 1; i >= 0; i--) {
    const c = components[i];
    if (x >= c.x && x < c.x + c.w && y >= c.y && y < c.y + c.h) return c;
  }
  return null;
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function draw() {
  ctx.clearRect(0, 0, layoutWidth, layoutHeight);
  drawBackground();

  if (document.getElementById("showArt").checked) {
    drawHudArt();
  }

  for (const c of components) drawComponent(c);

  if (document.getElementById("showGrid").checked) drawGrid();

  const selected = getSelected();
  if (selected) drawSelection(selected);

  if (mouse.x >= 0) {
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fillRect(mouse.x, 0, 1, layoutHeight);
    ctx.fillRect(0, mouse.y, layoutWidth, 1);
  }
}

function drawBackground() {
  ctx.fillStyle = "#05080C";
  ctx.fillRect(0, 0, layoutWidth, layoutHeight);
}

function drawHudArt() {
  // lightweight approximation of the real UI art layer
  ctx.fillStyle = "rgba(0,15,30,0.30)";
  ctx.fillRect(8, 7, 240, 176);
  drawCutFrame(8, 7, 240, 176, "rgba(102,204,255,0.22)");
  drawLine(4, 28, 4, 8, 0.35);
  drawLine(4, 8, 28, 8, 0.35);
  drawLine(252, 28, 252, 8, 0.35);
  drawLine(252, 8, 228, 8, 0.35);
  drawLine(4, 162, 4, 182, 0.35);
  drawLine(4, 182, 28, 182, 0.35);
  drawLine(252, 162, 252, 182, 0.35);
  drawLine(252, 182, 228, 182, 0.35);
}

function drawGrid() {
  const g = Math.max(1, parseInt(document.getElementById("gridSize").value || "2", 10));
  ctx.fillStyle = "rgba(102,204,255,0.08)";
  for (let x = 0; x < layoutWidth; x += g) ctx.fillRect(x, 0, 1, layoutHeight);
  for (let y = 0; y < layoutHeight; y += g) ctx.fillRect(0, y, layoutWidth, 1);

  ctx.fillStyle = "rgba(102,204,255,0.16)";
  for (let x = 0; x < layoutWidth; x += 16) ctx.fillRect(x, 0, 1, layoutHeight);
  for (let y = 0; y < layoutHeight; y += 16) ctx.fillRect(0, y, layoutWidth, 1);
}

function drawComponent(c) {
  const selected = c.id === selectedId;
  const color = c.color || "#66CCFF";

  if (c.type === "panel") {
    ctx.fillStyle = selected ? "rgba(102,204,255,0.14)" : "rgba(0,15,30,0.36)";
    ctx.fillRect(c.x, c.y, c.w, c.h);
    drawCutFrame(c.x, c.y, c.w, c.h, withAlpha(color, selected ? 0.85 : 0.42));
  } else if (c.type === "slot") {
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(c.x, c.y, c.w, c.h);
    ctx.strokeStyle = withAlpha(color, selected ? 1 : 0.55);
    ctx.strokeRect(c.x, c.y, c.w, c.h);
  } else if (c.type === "button") {
    ctx.fillStyle = selected ? "rgba(102,204,255,0.22)" : "rgba(102,204,255,0.08)";
    ctx.fillRect(c.x, c.y, c.w, c.h);
    ctx.strokeStyle = withAlpha(color, selected ? 1 : 0.55);
    ctx.strokeRect(c.x, c.y, c.w, c.h);
  } else {
    ctx.fillStyle = selected ? "rgba(255,184,108,0.22)" : "rgba(255,184,108,0.08)";
    ctx.fillRect(c.x, c.y, c.w, c.h);
    ctx.strokeStyle = withAlpha(color, selected ? 1 : 0.55);
    ctx.strokeRect(c.x, c.y, c.w, c.h);
  }

  ctx.font = "7px monospace";
  ctx.fillStyle = selected ? "#ffffff" : "#DDF6FF";
  ctx.fillText(c.label || c.id, c.x + 3, c.y + 8);

  ctx.font = "6px monospace";
  ctx.fillStyle = "#7FA9BA";
  ctx.fillText(c.x + "," + c.y + " " + c.w + "×" + c.h, c.x + 3, c.y + Math.min(c.h - 3, 17));
}

function drawSelection(c) {
  ctx.strokeStyle = "#ffffff";
  ctx.strokeRect(c.x - 1, c.y - 1, c.w + 2, c.h + 2);

  // resize handle
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(c.x + c.w - 4, c.y + c.h - 4, 5, 5);
  ctx.fillStyle = "#66CCFF";
  ctx.fillRect(c.x + c.w - 3, c.y + c.h - 3, 3, 3);
}

function drawCutFrame(x, y, w, h, stroke) {
  const c = Math.min(7, Math.floor(Math.min(w, h) / 3));
  ctx.strokeStyle = stroke;
  ctx.beginPath();
  ctx.moveTo(x + c, y);
  ctx.lineTo(x + w - c, y);
  ctx.lineTo(x + w, y + c);
  ctx.lineTo(x + w, y + h - c);
  ctx.lineTo(x + w - c, y + h);
  ctx.lineTo(x + c, y + h);
  ctx.lineTo(x, y + h - c);
  ctx.lineTo(x, y + c);
  ctx.closePath();
  ctx.stroke();
}

function drawLine(x1, y1, x2, y2, a) {
  ctx.strokeStyle = "rgba(102,204,255," + a + ")";
  ctx.beginPath();
  ctx.moveTo(x1 + 0.5, y1 + 0.5);
  ctx.lineTo(x2 + 0.5, y2 + 0.5);
  ctx.stroke();
}

function withAlpha(hex, a) {
  if (!hex || hex[0] !== "#") return hex || "rgba(102,204,255," + a + ")";
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + a + ")";
}

function renderList() {
  const list = document.getElementById("componentList");
  list.innerHTML = "";
  for (const c of components) {
    const div = document.createElement("div");
    div.className = "component-item" + (c.id === selectedId ? " selected" : "");
    div.onclick = () => {
      selectedId = c.id;
      syncInputsFromSelected();
      renderList();
      draw();
    };
    div.innerHTML =
      "<div>" + escapeHtml(c.id) + "</div>" +
      "<div class='meta'>" + escapeHtml(c.type) + " · x=" + c.x + " y=" + c.y + " w=" + c.w + " h=" + c.h + "</div>";
    list.appendChild(div);
  }
}

function syncInputsFromSelected() {
  const c = getSelected();
  document.getElementById("noSelection").style.display = c ? "none" : "block";
  document.getElementById("props").style.display = c ? "block" : "none";
  if (!c) return;
  document.getElementById("propId").value = c.id;
  document.getElementById("propType").value = c.type;
  document.getElementById("propLabel").value = c.label || "";
  document.getElementById("propData").value = c.data || "";
  document.getElementById("propX").value = c.x;
  document.getElementById("propY").value = c.y;
  document.getElementById("propW").value = c.w;
  document.getElementById("propH").value = c.h;
  document.getElementById("propColor").value = c.color || "#66CCFF";
}

function updateSelectedFromInputs() {
  const c = getSelected();
  if (!c) return;
  const newId = document.getElementById("propId").value.trim() || c.id;
  if (newId !== c.id && components.some(other => other !== c && other.id === newId)) {
    setStatus("ID already exists.");
    return;
  }
  c.id = newId;
  selectedId = newId;
  c.type = document.getElementById("propType").value;
  c.label = document.getElementById("propLabel").value;
  c.data = document.getElementById("propData").value;
  c.x = clamp(parseInt(document.getElementById("propX").value || "0", 10), 0, 255);
  c.y = clamp(parseInt(document.getElementById("propY").value || "0", 10), 0, 189);
  c.w = clamp(parseInt(document.getElementById("propW").value || "4", 10), 4, layoutWidth - c.x);
  c.h = clamp(parseInt(document.getElementById("propH").value || "4", 10), 4, layoutHeight - c.y);
  c.color = document.getElementById("propColor").value || "#66CCFF";
  renderList();
  draw();
}

function addComponent(type) {
  const base = type + "_" + Math.floor(Math.random() * 10000);
  const c = {
    id: base,
    type,
    label: type.toUpperCase(),
    x: 24,
    y: 40,
    w: type === "slot" ? 18 : 56,
    h: type === "slot" ? 18 : 18,
    color: type === "readout" ? "#FFB86C" : "#66CCFF",
    data: ""
  };
  components.push(c);
  selectedId = c.id;
  renderList();
  syncInputsFromSelected();
  draw();
}

function duplicateSelected() {
  const c = getSelected();
  if (!c) return;
  const copy = { ...c };
  copy.id = c.id + "_copy";
  while (components.some(x => x.id === copy.id)) copy.id += "_";
  copy.x = clamp(c.x + 4, 0, layoutWidth - c.w);
  copy.y = clamp(c.y + 4, 0, layoutHeight - c.h);
  components.push(copy);
  selectedId = copy.id;
  renderList();
  syncInputsFromSelected();
  draw();
}

function deleteSelected() {
  if (!selectedId) return;
  components = components.filter(c => c.id !== selectedId);
  selectedId = components[0]?.id || null;
  renderList();
  syncInputsFromSelected();
  draw();
}

function exportJSON() {
  document.getElementById("exportBox").value = JSON.stringify({
    width: layoutWidth,
    height: layoutHeight,
    components
  }, null, 2);
  setStatus("Exported JSON.");
}

function exportJavaConstants() {
  let out = "";
  out += "// Generated from Spectralization UI Layout Editor\\n";
  out += "// Logical GUI size: " + layoutWidth + " x " + layoutHeight + "\\n\\n";
  out += "private static final int IMAGE_WIDTH = " + layoutWidth + ";\\n";
  out += "private static final int IMAGE_HEIGHT = " + layoutHeight + ";\\n\\n";
  for (const c of components) {
    const name = c.id.toUpperCase().replace(/[^A-Z0-9]+/g, "_");
    out += "private static final int " + name + "_X = " + c.x + ";\\n";
    out += "private static final int " + name + "_Y = " + c.y + ";\\n";
    out += "private static final int " + name + "_W = " + c.w + ";\\n";
    out += "private static final int " + name + "_H = " + c.h + ";\\n";
    out += `// type=${c.type}, label=${JSON.stringify(c.label)}, data=${JSON.stringify(c.data)}\n\n`;
  }
  document.getElementById("exportBox").value = out;
  setStatus("Exported Java constants.");
}

function exportJavaRects() {
  let out = "";
  out += "// Optional helper: record UiRect(int x, int y, int w, int h) {}\\n";
  out += "// Generated layout rectangles\\n\\n";
  for (const c of components) {
    const name = c.id.toUpperCase().replace(/[^A-Z0-9]+/g, "_");
    out += "private static final UiRect " + name + " = new UiRect(" + c.x + ", " + c.y + ", " + c.w + ", " + c.h + ");";
    out += " // " + c.type + " · " + c.label + " · " + c.data + "\\n";
  }
  document.getElementById("exportBox").value = out;
  setStatus("Exported Java UiRect declarations.");
}

function importJSON() {
  try {
    applyImportedLayout(JSON.parse(document.getElementById("exportBox").value));
    setStatus("Imported JSON.");
  } catch (e) {
    setStatus("Import failed: " + e.message);
  }
}

function importJSONFile(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById("exportBox").value = String(reader.result || "");
    importJSON();
  };
  reader.onerror = () => setStatus("Import file failed.");
  reader.readAsText(file, "UTF-8");
  event.target.value = "";
}

function applyImportedLayout(parsed) {
  const importedComponents = Array.isArray(parsed) ? parsed : parsed.components;
  if (!Array.isArray(importedComponents)) throw new Error("Root must be an array or { components: [...] }.");

  if (!Array.isArray(parsed)) {
    setLayoutSize(Number(parsed.width || layoutWidth), Number(parsed.height || layoutHeight), false);
  }

  components = importedComponents.map(c => ({
      id: String(c.id || "component"),
      type: String(c.type || "custom"),
      label: String(c.label || c.id || ""),
      x: Number(c.x || 0),
      y: Number(c.y || 0),
      w: Number(c.w || 10),
      h: Number(c.h || 10),
      color: String(c.color || "#66CCFF"),
      data: String(c.data || "")
    }));
  selectedId = components[0]?.id || null;
  renderList();
  syncInputsFromSelected();
  syncLayoutInputs();
  draw();
}

function copyExport() {
  const box = document.getElementById("exportBox");
  box.focus();
  box.select();
  document.execCommand("copy");
  setStatus("Copied export text.");
}

function saveLocal() {
  localStorage.setItem("spectralization_ui_layout", JSON.stringify({
    width: layoutWidth,
    height: layoutHeight,
    components
  }));
  setStatus("Saved to localStorage.");
}

function loadLocal() {
  const raw = localStorage.getItem("spectralization_ui_layout");
  if (!raw) {
    setStatus("No local save found.");
    return;
  }
  document.getElementById("exportBox").value = raw;
  importJSON();
}

function setLayoutSize(width, height, redraw = true) {
  layoutWidth = clamp(Math.round(width || 256), 64, 512);
  layoutHeight = clamp(Math.round(height || 190), 64, 384);
  canvas.width = layoutWidth;
  canvas.height = layoutHeight;
  canvas.style.width = (layoutWidth * 3) + "px";
  canvas.style.height = (layoutHeight * 3) + "px";
  syncLayoutInputs();
  if (redraw) draw();
}

function updateLayoutFromInputs() {
  setLayoutSize(
    Number(document.getElementById("layoutW").value || layoutWidth),
    Number(document.getElementById("layoutH").value || layoutHeight)
  );
}

function syncLayoutInputs() {
  document.getElementById("layoutW").value = String(layoutWidth);
  document.getElementById("layoutH").value = String(layoutHeight);
}

function fitLayoutToComponents() {
  let maxX = 256;
  let maxY = 190;
  for (const c of components) {
    maxX = Math.max(maxX, c.x + c.w + 8);
    maxY = Math.max(maxY, c.y + c.h + 8);
  }
  setLayoutSize(maxX, maxY);
  setStatus("Fitted layout to components.");
}

function resetDefault() {
  setLayoutSize(256, 190, false);
  components = defaultComponents();
  selectedId = "root_panel";
  renderList();
  syncInputsFromSelected();
  draw();
  setStatus("Reset to default layout.");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}

function setStatus(s) {
  document.getElementById("status").textContent = s;
}

["snap", "gridSize", "showGrid", "showArt"].forEach(id => {
  document.getElementById(id).addEventListener("input", draw);
});

setLayoutSize(256, 190, false);
renderList();
syncInputsFromSelected();
draw();
exportJavaConstants();
</script>
</body>
</html>
