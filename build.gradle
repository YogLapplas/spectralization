        }

        [
                'expectFeedback(narrow, false, failures);',
                'expectFeedback(wide, false, failures);',
                'expectSolver(narrow, ScalarSolverKind.PROFILE_STATE_EXACT, failures);',
                'expectSolver(wide, ScalarSolverKind.PROFILE_STATE_EXACT, failures);',
                'wide.actualPower() < narrow.actualPower()',
                'ratio > 0.18D && ratio < 0.36D'
        ].each { required ->
            expect(
                    exampleSource.contains(required),
                    "fiber_radius_coupling must preserve passive coupling-loss expectation: ${required}"
            )
        }

        [
                'expectFeedback(narrow, true, failures);',
                'expectFeedback(wide, true, failures);',
                'expectFeedbackCollapsedEquivalence(narrow, failures);',
                'expectFeedbackCollapsedEquivalence(wide, failures);',
                'wide.actualPower() < narrow.actualPower() * 0.6D',
                'ratio > 0.05D && ratio < 0.6D'
        ].each { required ->
            expect(
                    exampleSource.contains(required),
                    "feedback_fiber_radius_loss must preserve passive feedback-loss expectation: ${required}"
            )
        }

        [
                'double expectedParallel = Math.min(SOURCE_POWER, single.actualPower() * 2.0D);',
                'expectPowerClose(parallel.actualPower(), expectedParallel, "parallel route power", failures);',
                'parallel.actualPower() + POWER_TOLERANCE < single.actualPower()'
        ].each { required ->
            expect(
                    exampleSource.contains(required),
                    "parallel_fiber_same_endpoint must preserve passive linear-merge expectation: ${required}"
            )
        }

        [
                'expectFeedback(expanded, true, failures);',
                'expectFeedbackCollapsedEquivalence(expanded, failures);',
                'ratio < BEAM_EXPANDER_MAX_IMPROVEMENT'
        ].each { required ->
            expect(
                    exampleSource.contains(required),
                    "beam_expander_fiber_coupling must preserve bounded passive feedback expectation: ${required}"
            )
        }

        expect(
                solverSource.contains('return BeamGeometryOps.clamp01(transfer.gain());'),
                'ProfileLanePowerSolver must clamp collapsed passive profile gain to [0, 1].'
        )
        expect(
                (solverSource =~ /double\s+baseGain\s*=\s*Math\.max\(0\.0D,\s*edge\.sampleGainFor\(lane\.frequency\(\)\)\)/).find(),
                'ProfileLanePowerSolver must discard negative sampled passive gains before solving.'
        )
    }
}

tasks.register('verifySpotProjectionContinuity') {
