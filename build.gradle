                || preview.x + preview.width > rightDivider.x
                || rightRegion.x < rightDivider.x + rightDivider.width) {
            throw new GradleException('Microlizer core content columns must stay separated by thin dividers.')
        }
        if (preview.x * 2 + preview.width != imageWidth) {
            throw new GradleException('Microlizer core preview must stay centered on the screen centerline.')
        }
        if (rightRegion.width > 36 || leftDivider.x - contentPanel.x < 32) {
            throw new GradleException('Microlizer core FE/sidebar space should grow while the output column stays narrow.')
        }
        assertCenterX('output slot and microlize button', outputSlot, microlizeButton, 0)

        if (redstoneTag.y < machinePanel.y || redstoneTag.y + redstoneTag.height > machinePanel.y + machinePanel.height) {
            throw new GradleException('Microlizer core redstone tag must stay vertically attached to the machine panel.')
        }
        if (workAreaTag.y < machinePanel.y || workAreaTag.y + workAreaTag.height > machinePanel.y + machinePanel.height) {
            throw new GradleException('Microlizer core work-area tag must stay vertically attached to the machine panel.')
        }
        if (redstoneTag.x + redstoneTag.width > machinePanel.x
                || workAreaTag.x + workAreaTag.width > machinePanel.x) {
            throw new GradleException('Microlizer core side tags must hang outside the left edge, not enter the machine panel.')
        }
        assertNoOverlap('side tags', [redstoneTag, workAreaTag])
        if (redstoneTag.x != workAreaTag.x || redstoneTag.width != workAreaTag.width || redstoneTag.height != workAreaTag.height) {
            throw new GradleException('Microlizer core side tags must share one sidebar grid.')
        }
        if (menuValue('OUTPUT_SLOT_X') != menuValue('OUTPUT_SLOT_FRAME_X') + menuValue('ITEM_SLOT_INSET')
                || menuValue('OUTPUT_SLOT_Y') != menuValue('OUTPUT_SLOT_FRAME_Y') + menuValue('ITEM_SLOT_INSET')
                || menuValue('PLAYER_INVENTORY_ITEM_X') != menuValue('PLAYER_INVENTORY_X') + menuValue('ITEM_SLOT_INSET')
                || menuValue('PLAYER_INVENTORY_ITEM_Y') != menuValue('PLAYER_INVENTORY_Y') + menuValue('ITEM_SLOT_INSET')) {
            throw new GradleException('Microlizer core item slots must stay inset from visible 18px slot frames.')
        }
        if (menuValue('PLAYER_INVENTORY_X') * 2 + slotSize * 9 != imageWidth
                || inventoryPanel.x * 2 + inventoryPanel.width != imageWidth) {
            throw new GradleException('Microlizer core player inventory slots and backing panel must stay horizontally centered.')
        }
    }
}

tasks.register('verifyMachineContentDropContracts') {
    def blockEntityDir = file('src/main/java/io/github/yoglappland/spectralization/blockentity')
    def blockDir = file('src/main/java/io/github/yoglappland/spectralization/block')
    inputs.dir(blockEntityDir)
    inputs.dir(blockDir)

    doLast {
        def blockEntityRoot = blockEntityDir.toPath()
        def blockRoot = blockDir.toPath()
        def blockEntitySources
        java.nio.file.Files.walk(blockEntityRoot).withCloseable { paths ->
            blockEntitySources = paths
                    .filter { path -> java.nio.file.Files.isRegularFile(path) }
                    .filter { path -> path.fileName.toString().endsWith('BlockEntity.java') }
                    .map { path -> path.toFile() }
                    .toList()
        }
        def blockEntitiesWithItemHandlers = blockEntitySources.findAll { sourceFile ->
            sourceFile.text.contains('ItemStackHandler')
        }

        def missingDropInterface = blockEntitiesWithItemHandlers.findAll { sourceFile ->
            !(sourceFile.text =~ /implements[^{]+DropsContentsOnRemove/).find()
        }
        if (!missingDropInterface.isEmpty()) {
            throw new GradleException(
                    "Block entities with ItemStackHandler must implement DropsContentsOnRemove: "
                            + missingDropInterface.collect { it.name }.join(', ')
