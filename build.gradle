tasks.register('verifyBasicLithographyMachineUiLayout') {
    inputs.files(basicLithographyMachineLayoutSourceFile, basicLithographyMachineScreenSourceFile)

    doLast {
        def source = basicLithographyMachineLayoutSourceFile.text
        def screenSource = basicLithographyMachineScreenSourceFile.text
        def constants = [:]
        def constantsPattern = ~/public static final int\s+([A-Z0-9_]+)\s*=\s*([^;]+);/

        10.times {
            (source =~ constantsPattern).each { match ->
                def name = match[1]
                def expression = match[2]
                if (!constants.containsKey(name)) {
                    def resolvedExpression = expression.replaceAll(/\b[A-Z][A-Z0-9_]*\b/) { token ->
                        def key = token.toString()
                        constants.containsKey(key) ? constants[key].toString() : key
                    }

                    if (resolvedExpression ==~ '[0-9+\\-*/ ()]+') {
                        constants[name] = groovy.util.Eval.me(resolvedExpression) as int
                    }
                }
            }
        }

        def intValue = { String name ->
            if (!constants.containsKey(name)) {
                throw new GradleException("Could not resolve BasicLithographyMachineLayout constant '${name}' for UI layout verification.")
            }
            constants[name] as int
        }
        def rect = { String name, int x, int y, int width, int height ->
            [name: name, x: x, y: y, width: width, height: height]
        }
        def overlaps = { a, b ->
            a.x < b.x + b.width
                    && a.x + a.width > b.x
                    && a.y < b.y + b.height
                    && a.y + a.height > b.y
        }
        def contains = { outer, inner ->
            inner.x >= outer.x
                    && inner.y >= outer.y
                    && inner.x + inner.width <= outer.x + outer.width
                    && inner.y + inner.height <= outer.y + outer.height
        }
        def assertInside = { outer, inner ->
            if (!contains(outer, inner)) {
                throw new GradleException("Basic lithography machine layout '${inner.name}' must stay inside '${outer.name}'.")
            }
        }
        def assertNoOverlap = { String label, List areas ->
            def collisions = []
            for (int leftIndex = 0; leftIndex < areas.size(); leftIndex++) {
                for (int rightIndex = leftIndex + 1; rightIndex < areas.size(); rightIndex++) {
                    if (overlaps(areas[leftIndex], areas[rightIndex])) {
                        collisions.add("${areas[leftIndex].name}<->${areas[rightIndex].name}")
                    }
                }
            }
            if (!collisions.isEmpty()) {
                throw new GradleException("Basic lithography machine ${label} overlap: ${collisions.join(', ')}")
            }
        }
        def assertNear = { name, actualValue, expectedValue, toleranceValue ->
            double actual = actualValue as double
            double expected = expectedValue as double
            double tolerance = toleranceValue as double
            if (Math.abs(actual - expected) > tolerance) {
                throw new GradleException("${name} should sit near ${expected.round(2)}, but was ${actual.round(2)}.")
            }
        }

        ['FREQUENCY_BOX', 'DATA_FREQUENCY', 'tooltip.frequency'].each { token ->
            if (screenSource.contains(token) || source.contains(token)) {
                throw new GradleException("Basic lithography machine UI must not reintroduce frequency channel token '${token}'.")
            }
        }

        def slotSize = intValue('SLOT_SIZE')
        def screen = rect('screen', 0, 0, intValue('IMAGE_WIDTH'), intValue('IMAGE_HEIGHT'))
        def machine = rect('machine_panel', 0, 0, intValue('IMAGE_WIDTH'), intValue('MACHINE_HEIGHT'))
        def leftPanel = rect('left_input_panel', intValue('LEFT_PANEL_X'), intValue('SIDE_PANEL_Y'), intValue('SIDE_PANEL_WIDTH'), intValue('SIDE_PANEL_HEIGHT'))
        def rightPanel = rect('right_output_panel', intValue('RIGHT_PANEL_X'), intValue('SIDE_PANEL_Y'), intValue('SIDE_PANEL_WIDTH'), intValue('SIDE_PANEL_HEIGHT'))
        def chamber = rect('main_chamber', intValue('CHAMBER_X'), intValue('CHAMBER_Y'), intValue('CHAMBER_WIDTH'), intValue('CHAMBER_HEIGHT'))
        def chamberInner = rect('main_chamber_inner', intValue('CHAMBER_INNER_X'), intValue('CHAMBER_INNER_Y'), intValue('CHAMBER_INNER_WIDTH'), intValue('CHAMBER_INNER_HEIGHT'))
        def mainPanel = rect('main_panel', intValue('MAIN_PANEL_X'), intValue('MAIN_PANEL_Y'), intValue('MAIN_PANEL_WIDTH'), intValue('MAIN_PANEL_HEIGHT'))

        [leftPanel, rightPanel, chamber].each { assertInside(machine, it) }
        [chamberInner, mainPanel].each { assertInside(chamber, it) }
        if (intValue('SIDE_PANEL_HEIGHT') != intValue('CHAMBER_HEIGHT')) {
            throw new GradleException('Basic lithography machine left, center, and right boxes must share the same height.')
        }
        if (intValue('RIGHT_PANEL_X') != intValue('IMAGE_WIDTH') - intValue('LEFT_PANEL_X') - intValue('SIDE_PANEL_WIDTH')) {
            throw new GradleException('Basic lithography machine left and right boxes must mirror across the screen center.')
        }
        if (intValue('CHAMBER_X') * 2 + intValue('CHAMBER_WIDTH') != intValue('IMAGE_WIDTH')) {
            throw new GradleException('Basic lithography machine main chamber must be horizontally centered.')
        }

        def leftOuterGap = intValue('LEFT_PANEL_X')
        def rightOuterGap = intValue('IMAGE_WIDTH') - (intValue('RIGHT_PANEL_X') + intValue('SIDE_PANEL_WIDTH'))
        def leftInnerGap = intValue('CHAMBER_X') - (intValue('LEFT_PANEL_X') + intValue('SIDE_PANEL_WIDTH'))
        def rightInnerGap = intValue('RIGHT_PANEL_X') - (intValue('CHAMBER_X') + intValue('CHAMBER_WIDTH'))
        if (leftOuterGap != rightOuterGap || leftInnerGap != rightInnerGap) {
