                exampleSource.contains('Math.abs(output.coherentPower() - output.power()) > POWER_TOLERANCE'),
                'OpticalExampleValidator.commonProfilerFailures must keep coherent and total power aligned for coherent passive tests.'
        )
        expect(
                exampleSource.contains('output.strayPower() > POWER_TOLERANCE'),
                'OpticalExampleValidator.commonProfilerFailures must reject stray power in coherent passive tests.'
        )

        [
                'expectFeedback(sample, true, failures);',
                'expectFeedbackCollapsedEquivalence(sample, failures);',
                'expectPowerClose(sample.actualPower(), expectedPower, "profiler power", failures);',
