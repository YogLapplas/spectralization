        assertNoOverlap('hover area', hoverAreas + [ruleButtonHover, ioButtonHover])

        if (intValue('ITEM_TEMPLATE_INPUT_A_X') != intValue('TEMPLATE_LEFT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_TEMPLATE_INPUT_A_Y') != intValue('TEMPLATE_INPUT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_TEMPLATE_INPUT_B_X') != intValue('TEMPLATE_RIGHT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_TEMPLATE_INPUT_B_Y') != intValue('TEMPLATE_INPUT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_TEMPLATE_OUTPUT_A_X') != intValue('TEMPLATE_LEFT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_TEMPLATE_OUTPUT_A_Y') != intValue('TEMPLATE_OUTPUT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_TEMPLATE_OUTPUT_B_X') != intValue('TEMPLATE_RIGHT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_TEMPLATE_OUTPUT_B_Y') != intValue('TEMPLATE_OUTPUT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_0_X') != intValue('LEFT_ITEM_INPUT_0_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_0_Y') != intValue('LEFT_ITEM_INPUT_TOP_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_1_X') != intValue('LEFT_ITEM_INPUT_1_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_1_Y') != intValue('LEFT_ITEM_INPUT_TOP_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_2_X') != intValue('LEFT_ITEM_INPUT_0_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_2_Y') != intValue('LEFT_ITEM_INPUT_BOTTOM_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_3_X') != intValue('LEFT_ITEM_INPUT_1_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_3_Y') != intValue('LEFT_ITEM_INPUT_BOTTOM_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_0_X') != intValue('RIGHT_ITEM_OUTPUT_0_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_0_Y') != intValue('RIGHT_ITEM_OUTPUT_TOP_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_1_X') != intValue('RIGHT_ITEM_OUTPUT_1_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_1_Y') != intValue('RIGHT_ITEM_OUTPUT_TOP_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_2_X') != intValue('RIGHT_ITEM_OUTPUT_0_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_2_Y') != intValue('RIGHT_ITEM_OUTPUT_BOTTOM_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_3_X') != intValue('RIGHT_ITEM_OUTPUT_1_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_3_Y') != intValue('RIGHT_ITEM_OUTPUT_BOTTOM_Y') + intValue('ITEM_SLOT_INSET')) {
            throw new GradleException('Basic lithography machine item render slots must stay inset from visible 18px slot frames.')
        }

        if (intValue('PLAYER_INVENTORY_X') * 2 + 9 * slotSize != intValue('IMAGE_WIDTH')
                || intValue('PLAYER_INVENTORY_ITEM_X') != intValue('PLAYER_INVENTORY_X')
                || intValue('PLAYER_INVENTORY_ITEM_Y') != intValue('PLAYER_INVENTORY_Y')) {
            throw new GradleException('Basic lithography machine player inventory must stay centered; menu slot origins must match the 16px item origin inside visible 18px frames.')
        }
        [machine, leftPanel, rightPanel, chamber, chamberInner, mainPanel].each { assertInside(screen, it) }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyThermalSmelterUiLayout')
    dependsOn tasks.named('verifyLensGrindingBenchUiLayout')
    dependsOn tasks.named('verifyMetamaterialDesignTableUiLayout')
    dependsOn tasks.named('verifyBasicLithographyMachineUiLayout')
}

