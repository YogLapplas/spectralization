                    intValue('PLAYER_INVENTORY_X') + column * intValue('SLOT_SIZE'),
                    hotbarY,
                    intValue('SLOT_SIZE'),
                    intValue('SLOT_SIZE')))
        }

        [machine, leftPanel, rightPanel, mainPanel, playerPanel].each { assertInside(screen, it) }
        [mainInner, energyRegion, workRegion].each { assertInside(mainPanel, it) }
        [moldRegion, propertyRegion].each { assertInside(workRegion, it) }
        [drawRegion, moldOutputRegion].each { assertInside(moldRegion, it) }
        assertInside(leftPanel, materialSlot)
        assertInside(rightPanel, outputSlot)
        assertInside(energyRegion, energyBar)
        assertInside(moldRegion, moldInput)
        assertInside(moldRegion, moldOutput)
        assertInside(moldOutputRegion, moldOutput)
        [drawLine, recipeClick].each { assertInside(drawRegion, it) }
        propertyBars.each { assertInside(propertyRegion, it) }
        playerSlots.each { assertInside(playerPanel, it) }

        if (intValue('SIDE_PANEL_HEIGHT') != intValue('MAIN_PANEL_HEIGHT')) {
            throw new GradleException('Fiber drawing machine side panels and main panel must share height.')
        }
        if (intValue('RIGHT_PANEL_X') != intValue('IMAGE_WIDTH') - intValue('LEFT_PANEL_X') - intValue('SIDE_PANEL_WIDTH')) {
            throw new GradleException('Fiber drawing machine side panels must mirror across the screen center.')
        }
        if (intValue('MAIN_PANEL_X') * 2 + intValue('MAIN_PANEL_WIDTH') != intValue('IMAGE_WIDTH')) {
            throw new GradleException('Fiber drawing machine main panel must be horizontally centered.')
        }
        if (intValue('WORK_REGION_X') != intValue('ENERGY_REGION_X') + intValue('ENERGY_REGION_WIDTH') + intValue('MAIN_BOX_GAP')
                || intValue('WORK_REGION_X') + intValue('WORK_REGION_WIDTH') != intValue('MAIN_INNER_X') + intValue('MAIN_INNER_WIDTH')) {
            throw new GradleException('Fiber drawing machine main panel must split into FE and work columns.')
        }
        if (intValue('MOLD_REGION_X') != intValue('WORK_REGION_X')
                || intValue('PROPERTY_REGION_X') != intValue('WORK_REGION_X')
                || intValue('MOLD_REGION_WIDTH') != intValue('WORK_REGION_WIDTH')
                || intValue('PROPERTY_REGION_WIDTH') != intValue('WORK_REGION_WIDTH')) {
            throw new GradleException('Fiber drawing machine work column vbox regions must share x and width.')
        }
        if (intValue('DRAW_REGION_X') != intValue('MOLD_REGION_X')
                || intValue('MOLD_OUTPUT_REGION_X') != intValue('MOLD_REGION_X')
                || intValue('DRAW_REGION_WIDTH') != intValue('MOLD_REGION_WIDTH')
                || intValue('MOLD_OUTPUT_REGION_WIDTH') != intValue('MOLD_REGION_WIDTH')) {
            throw new GradleException('Fiber drawing machine mold and drawing rows must belong to one visible vbox.')
        }
        if (intValue('DRAW_REGION_Y') != intValue('MOLD_REGION_Y') + intValue('MOLD_INPUT_REGION_HEIGHT') + intValue('MAIN_BOX_GAP')
                || intValue('MOLD_OUTPUT_REGION_Y') != intValue('DRAW_REGION_Y') + intValue('DRAW_REGION_HEIGHT') + 2
                || intValue('MOLD_REGION_Y') + intValue('MOLD_REGION_HEIGHT') != intValue('MOLD_OUTPUT_REGION_Y') + intValue('MOLD_OUTPUT_REGION_HEIGHT')
                || intValue('PROPERTY_REGION_Y') != intValue('MOLD_REGION_Y') + intValue('MOLD_REGION_HEIGHT') + intValue('MAIN_BOX_GAP')
                || intValue('PROPERTY_REGION_Y') + intValue('PROPERTY_REGION_HEIGHT') != intValue('WORK_REGION_Y') + intValue('WORK_REGION_HEIGHT')) {
            throw new GradleException('Fiber drawing machine work column must stack one mold/drawing vbox and the fiber property box vertically.')
        }
        if (intValue('MATERIAL_SLOT_Y') != intValue('OUTPUT_SLOT_Y')) {
            throw new GradleException('Fiber drawing machine material and output slots must share a horizontal axis.')
        }
        if ((intValue('MATERIAL_SLOT_X') + intValue('SLOT_SIZE') / 2)
                + (intValue('OUTPUT_SLOT_X') + intValue('SLOT_SIZE') / 2) != intValue('IMAGE_WIDTH')) {
            throw new GradleException('Fiber drawing machine material and output slots must be symmetric about the screen center.')
        }
        if (intValue('MOLD_SLOT_Y') < intValue('MOLD_REGION_Y')
                || intValue('MOLD_SLOT_Y') + intValue('SLOT_SIZE') > intValue('DRAW_REGION_Y')
                || intValue('DRAW_REGION_Y') - (intValue('MOLD_SLOT_Y') + intValue('SLOT_SIZE')) != 2
                || intValue('MOLD_OUTPUT_SLOT_Y') < intValue('MOLD_OUTPUT_REGION_Y')
                || intValue('MOLD_OUTPUT_SLOT_Y') + intValue('SLOT_SIZE') > intValue('MOLD_REGION_Y') + intValue('MOLD_REGION_HEIGHT')
                || intValue('MOLD_OUTPUT_SLOT_Y') - (intValue('DRAW_REGION_Y') + intValue('DRAW_REGION_HEIGHT')) != 2) {
            throw new GradleException('Fiber drawing machine mold slots must sit close to the central drawing region inside the shared vbox.')
        }
        if (intValue('MOLD_INPUT_SLOT_X') != intValue('MOLD_OUTPUT_SLOT_X')
                || intValue('MOLD_INPUT_SLOT_X') + intValue('SLOT_SIZE') / 2.0 != intValue('WORK_REGION_X') + intValue('WORK_REGION_WIDTH') / 2.0) {
            throw new GradleException('Fiber drawing machine mold input and return slots must share the work column centerline.')
        }
        if (intValue('DRAW_LINE_X') + intValue('DRAW_LINE_WIDTH') / 2.0
                != intValue('DRAW_REGION_X') + intValue('DRAW_REGION_WIDTH') / 2.0) {
            throw new GradleException('Fiber drawing machine drawing animation must be centered in the draw region.')
        }
        if (intValue('RECIPE_CLICK_X') + intValue('RECIPE_CLICK_WIDTH') / 2.0
                != intValue('DRAW_LINE_X') + intValue('DRAW_LINE_WIDTH') / 2.0
                || intValue('RECIPE_CLICK_Y') + intValue('RECIPE_CLICK_HEIGHT') / 2.0
                != intValue('DRAW_LINE_Y') + intValue('DRAW_LINE_HEIGHT') / 2.0) {
            throw new GradleException('Fiber drawing machine recipe click area must stay centered on the drawing animation.')
        }
        if (intValue('ITEM_MATERIAL_X') != intValue('MATERIAL_SLOT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_MATERIAL_Y') != intValue('MATERIAL_SLOT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_X') != intValue('OUTPUT_SLOT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_Y') != intValue('OUTPUT_SLOT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_MOLD_INPUT_X') != intValue('MOLD_INPUT_SLOT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_MOLD_INPUT_Y') != intValue('MOLD_SLOT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_MOLD_OUTPUT_X') != intValue('MOLD_OUTPUT_SLOT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_MOLD_OUTPUT_Y') != intValue('MOLD_OUTPUT_SLOT_Y') + intValue('ITEM_SLOT_INSET')) {
            throw new GradleException('Fiber drawing machine item slots must stay inset from visible 18px slot frames.')
        }
        if (intValue('PLAYER_INVENTORY_X') * 2 + 9 * intValue('SLOT_SIZE') != intValue('IMAGE_WIDTH')
                || intValue('PLAYER_INVENTORY_ITEM_X') != intValue('PLAYER_INVENTORY_X') + intValue('ITEM_SLOT_INSET')
                || intValue('PLAYER_INVENTORY_ITEM_Y') != intValue('PLAYER_INVENTORY_Y') + intValue('ITEM_SLOT_INSET')) {
            throw new GradleException('Fiber drawing machine player inventory must stay centered with 1px item inset.')
        }
        if (intValue('PLAYER_INVENTORY_PANEL_X') + intValue('PLAYER_INVENTORY_PANEL_WIDTH') / 2.0 != intValue('IMAGE_WIDTH') / 2.0) {
            throw new GradleException('Fiber drawing machine player inventory backing panel must be centered.')
        }

        assertNoOverlap('machine slot', [materialSlot, outputSlot, moldInput, moldOutput])
        assertNoOverlap('work vbox area', [moldRegion, propertyRegion])
        assertNoOverlap('draw visual area', [moldInput, moldOutput, recipeClick])
        assertNoOverlap('property bar', propertyBars)
        assertNoOverlap('player inventory slot', playerSlots)
    }
}

tasks.register('verifyHolographicStorageUiLayout') {
    def storageScreenSourceFile =
            file('src/main/java/io/github/yoglappland/spectralization/client/screen/HolographicStorageScreen.java')
    def storageMenuSourceFile =
            file('src/main/java/io/github/yoglappland/spectralization/menu/HolographicStorageMenu.java')
    def coreScreenSourceFile =
            file('src/main/java/io/github/yoglappland/spectralization/client/screen/HolographicStorageCoreScreen.java')
    inputs.files(storageScreenSourceFile, storageMenuSourceFile, coreScreenSourceFile)

    doLast {
        def loadConstants = { sourceFile ->
            def source = sourceFile.text
            def constants = [:]
            def constantsPattern = ~/(?:private|public)\s+static\s+final\s+int\s+([A-Z0-9_]+)\s*=\s*([^;]+);/

            12.times {
                (source =~ constantsPattern).each { match ->
                    def name = match[1]
                    def expression = match[2]
                    if (!constants.containsKey(name)) {
                        def resolvedExpression = expression.replaceAll(/\b[A-Z][A-Z0-9_]*\b/) { token ->
                            def key = token.toString()
                            constants.containsKey(key) ? constants[key].toString() : key
                        }

                        if (resolvedExpression ==~ '[0-9+\\-*/ ()]+') {
                            constants[name] = groovy.util.Eval.me(resolvedExpression) as int
                        }
                    }
                }
            }
            constants
        }

        def screenConstants = loadConstants(storageScreenSourceFile)
        def menuConstants = loadConstants(storageMenuSourceFile)
        def coreConstants = loadConstants(coreScreenSourceFile)
        def screenValue = { String name ->
            if (!screenConstants.containsKey(name)) {
                throw new GradleException("Could not resolve HolographicStorageScreen constant '${name}' for UI layout verification.")
            }
            screenConstants[name] as int
        }
        def menuValue = { String name ->
            if (!menuConstants.containsKey(name)) {
                throw new GradleException("Could not resolve HolographicStorageMenu constant '${name}' for UI layout verification.")
            }
            menuConstants[name] as int
        }
        def coreValue = { String name ->
            if (!coreConstants.containsKey(name)) {
                throw new GradleException("Could not resolve HolographicStorageCoreScreen constant '${name}' for UI layout verification.")
            }
            coreConstants[name] as int
        }
        def rect = { String name, int x, int y, int width, int height ->
            [name: name, x: x, y: y, width: width, height: height]
        }
        def overlaps = { a, b ->
            a.x < b.x + b.width
                    && a.x + a.width > b.x
                    && a.y < b.y + b.height
                    && a.y + a.height > b.y
        }
        def assertInside = { outer, inner ->
            if (inner.x < outer.x
                    || inner.y < outer.y
                    || inner.x + inner.width > outer.x + outer.width
                    || inner.y + inner.height > outer.y + outer.height) {
                throw new GradleException("Holographic storage ${inner.name} must stay inside ${outer.name}.")
            }
        }
        def assertNoOverlap = { String group, areas ->
            def collisions = []
            for (int leftIndex = 0; leftIndex < areas.size(); leftIndex++) {
                for (int rightIndex = leftIndex + 1; rightIndex < areas.size(); rightIndex++) {
                    if (overlaps(areas[leftIndex], areas[rightIndex])) {
                        collisions.add("${areas[leftIndex].name}<->${areas[rightIndex].name}")
                    }
                }
            }
            if (!collisions.isEmpty()) {
                throw new GradleException("Holographic storage ${group} overlap: ${collisions.join(', ')}")
            }
        }

        int imageWidth = 286
        int imageHeight = 302
        int slot = screenValue('GRID_SLOT_SIZE')
        def screen = rect('screen', 0, 0, imageWidth, imageHeight)
        def storagePanel = rect('storage_panel', screenValue('STORAGE_PANEL_LEFT'), screenValue('STORAGE_PANEL_TOP'),
                screenValue('STORAGE_PANEL_WIDTH'), screenValue('STORAGE_PANEL_HEIGHT'))
        def matrixArea = rect('matrix_area', screenValue('MATRIX_CELL_AREA_LEFT'), screenValue('MATRIX_CELL_AREA_TOP'),
                screenValue('MATRIX_CELL_AREA_WIDTH'), screenValue('MATRIX_CELL_AREA_HEIGHT'))
        def meterPanel = rect('meter_panel', screenValue('METER_PANEL_LEFT'), screenValue('METER_PANEL_TOP'),
                screenValue('METER_PANEL_WIDTH'), screenValue('METER_PANEL_HEIGHT'))
        def craftingPanel = rect('crafting_panel', screenValue('CRAFTING_PANEL_LEFT'), screenValue('CRAFTING_PANEL_TOP'),
                screenValue('CRAFTING_PANEL_WIDTH'), screenValue('CRAFTING_PANEL_HEIGHT'))
        def craftingInner = rect('crafting_inner',
                craftingPanel.x + screenValue('CRAFTING_PANEL_INSET'),
                craftingPanel.y + screenValue('CRAFTING_PANEL_INSET'),
                craftingPanel.width - screenValue('CRAFTING_PANEL_INSET') * 2,
                craftingPanel.height - screenValue('CRAFTING_PANEL_INSET') * 2)
        def inventoryPanel = rect('player_inventory_panel', screenValue('INVENTORY_PANEL_LEFT'),
                screenValue('INVENTORY_PANEL_TOP'), screenValue('INVENTORY_PANEL_WIDTH'),
                screenValue('INVENTORY_PANEL_HEIGHT'))
        def storageCells = []

        for (int row = 0; row < screenValue('GRID_ROWS'); row++) {
            for (int column = 0; column < screenValue('GRID_COLUMNS'); column++) {
                int itemX = screenValue('GRID_LEFT') + column * slot
                int itemY = screenValue('GRID_TOP') + row * slot
                def cell = rect("matrix_cell_${row}_${column}", itemX - 1, itemY - 1, slot, slot)
                def item = rect("matrix_item_${row}_${column}", itemX, itemY, 16, 16)
                storageCells.add(cell)
                assertInside(matrixArea, cell)
                assertInside(cell, item)
                if (item.x * 2 + item.width != cell.x * 2 + cell.width
                        || item.y * 2 + item.height != cell.y * 2 + cell.height) {
                    throw new GradleException('Holographic storage matrix items must stay centered in their virtual cells.')
                }
            }
        }

        int gridVisualX = menuValue('CRAFTING_GRID_X') - 1
        int gridVisualY = menuValue('CRAFTING_GRID_Y') - 1
        def craftingGrid = rect('crafting_grid', gridVisualX, gridVisualY, slot * 3, slot * 3)
        def resultSlot = rect('crafting_result', menuValue('CRAFTING_RESULT_X') - 1,
                menuValue('CRAFTING_RESULT_Y') - 1, slot, slot)
        def craftingArrow = rect('crafting_arrow',
                menuValue('CRAFTING_GRID_X') + screenValue('CRAFTING_ARROW_OFFSET_X'),
                menuValue('CRAFTING_RESULT_Y') + screenValue('CRAFTING_ARROW_OFFSET_Y'),
                screenValue('CRAFTING_ARROW_WIDTH'),
                8)
        [craftingGrid, resultSlot, craftingArrow].each { assertInside(craftingInner, it) }

        if (craftingGrid.x + resultSlot.x + resultSlot.width
                != craftingPanel.x * 2 + craftingPanel.width) {
            throw new GradleException('Holographic storage crafting grid and result slot must balance around the crafting panel centerline.')
        }
        if (craftingGrid.y * 2 + craftingGrid.height != resultSlot.y * 2 + resultSlot.height) {
            throw new GradleException('Holographic storage crafting grid and result slot must share a vertical centerline.')
        }
        if (Math.abs((craftingArrow.x - (craftingGrid.x + craftingGrid.width))
                - (resultSlot.x - (craftingArrow.x + craftingArrow.width))) > 2) {
            throw new GradleException('Holographic storage crafting arrow must stay centered between grid and result slot.')
        }

        def playerMainSlots = rect('player_main_slots', menuValue('PLAYER_INVENTORY_X') - 1,
                menuValue('PLAYER_INVENTORY_Y') - 1, slot * 9, slot * 3)
        def playerHotbar = rect('player_hotbar', menuValue('PLAYER_INVENTORY_X') - 1,
                menuValue('PLAYER_INVENTORY_Y') + 58 - 1, slot * 9, slot)
        [playerMainSlots, playerHotbar].each { assertInside(inventoryPanel, it) }
        if (inventoryPanel.x * 2 + inventoryPanel.width != imageWidth) {
            throw new GradleException('Holographic storage player inventory backing panel must be horizontally centered.')
        }
        if (playerMainSlots.x * 2 + playerMainSlots.width != imageWidth
                || playerHotbar.x * 2 + playerHotbar.width != imageWidth) {
            throw new GradleException('Holographic storage player inventory slots must be horizontally centered.')
        }

        [storagePanel, craftingPanel, inventoryPanel].each { assertInside(screen, it) }
        [matrixArea, meterPanel].each { assertInside(storagePanel, it) }
        assertNoOverlap('top panel area', [matrixArea, meterPanel])
        assertNoOverlap('vertical section', [storagePanel, craftingPanel, inventoryPanel])

        def coreScreen = rect('core_screen', 0, 0, coreValue('SCREEN_WIDTH'), coreValue('SCREEN_HEIGHT'))
        def corePanel = rect('core_panel', coreValue('CORE_PANEL_X'), coreValue('CORE_PANEL_Y'),
                coreValue('CORE_PANEL_WIDTH'), coreValue('CORE_PANEL_HEIGHT'))
        def gaugePanel = rect('gauge_panel', coreValue('GAUGE_PANEL_X'), coreValue('GAUGE_PANEL_Y'),
                coreValue('GAUGE_PANEL_WIDTH'), coreValue('GAUGE_PANEL_HEIGHT'))
        def statusPanel = rect('status_panel', coreValue('STATUS_PANEL_X'), coreValue('STATUS_PANEL_Y'),
                coreValue('STATUS_PANEL_WIDTH'), coreValue('STATUS_PANEL_HEIGHT'))
        [corePanel, gaugePanel, statusPanel].each { assertInside(coreScreen, it) }
        [gaugePanel, statusPanel].each { assertInside(corePanel, it) }
        assertNoOverlap('core panel area', [gaugePanel, statusPanel])
        if (corePanel.x * 2 + corePanel.width != coreValue('SCREEN_WIDTH')) {
            throw new GradleException('Holographic storage core main panel must be horizontally centered.')
        }
        if (gaugePanel.y != statusPanel.y || gaugePanel.height != statusPanel.height) {
            throw new GradleException('Holographic storage core gauge and status panels must share vertical bounds.')
        }
    }
}

