        }

        [
                'expectFeedback(sample, false, failures);',
                'expectSolver(sample, ScalarSolverKind.PROFILE_STATE_EXACT, failures);',
                'expectNoProfileDegradation(sample, failures);',
                'apertureGain > 0.0D && apertureGain < 1.0D'
