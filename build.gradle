plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
    exclude("spectralization (1).png") // local duplicate/reference image
    exclude("assets/spectralization/**/backup*/**") // local model backups
    exclude("assets/spectralization/**/* - Copy.json") // editor duplicate model files
    exclude("assets/spectralization/**/*_backup.png") // editor duplicate textures
}

repositories {
    // Add here additional repositories if required by some of the dependencies below.
    maven {
        url = "https://api.modrinth.com/maven"
    }
    maven {
        url = "https://maven.firstdark.dev/snapshots"
    }
    maven {
        url = "https://maven.blamejared.com"
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    compileOnly "maven.modrinth:jade:${jade_version}"
    localRuntime "maven.modrinth:jade:${jade_version}"
    implementation "com.lowdragmc.ldlib2:ldlib2-neoforge-${minecraft_version}:${ldlib2_version}:all"
    compileOnly "mezz.jei:jei-${minecraft_version}-common-api:${jei_version}"
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    localRuntime "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"

    // Example optional mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-neoforge-api:${jei_version}"
    // We add the full version to localRuntime, not runtimeOnly, so that we do not publish a dependency on it
    // localRuntime "mezz.jei:jei-${mc_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            ldlib2_version          : ldlib2_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

def thermalSmelterLayoutSourceFile = file('src/main/java/io/github/yoglappland/spectralization/menu/ThermalSmelterLayout.java')
def lensGrindingBenchLayoutSourceFile = file('src/main/java/io/github/yoglappland/spectralization/menu/LensGrindingBenchLayout.java')
def lensGrindingBenchScreenSourceFile = file('src/main/java/io/github/yoglappland/spectralization/client/screen/LensGrindingBenchScreen.java')
def lensGuiTextureDir = file('src/main/resources/assets/spectralization/textures/gui/lens')
def metamaterialDesignTableLayoutSourceFile = file('src/main/java/io/github/yoglappland/spectralization/menu/MetamaterialDesignTableLayout.java')
def basicLithographyMachineLayoutSourceFile = file('src/main/java/io/github/yoglappland/spectralization/menu/BasicLithographyMachineLayout.java')
def basicLithographyMachineScreenSourceFile = file('src/main/java/io/github/yoglappland/spectralization/client/screen/BasicLithographyMachineScreen.java')
def solarDopingChamberLayoutSourceFile = file('src/main/java/io/github/yoglappland/spectralization/menu/SolarDopingChamberLayout.java')
def microlizerCoreScreenSourceFile = file('src/main/java/io/github/yoglappland/spectralization/client/screen/MicrolizerCoreScreen.java')
def microlizerCoreMenuSourceFile = file('src/main/java/io/github/yoglappland/spectralization/menu/MicrolizerCoreMenu.java')
tasks.register('verifyThermalSmelterUiLayout') {
    inputs.file(thermalSmelterLayoutSourceFile)

    doLast {
        def source = thermalSmelterLayoutSourceFile.text
        def constants = [:]
        def constantsPattern = ~/public static final int\s+([A-Z0-9_]+)\s*=\s*([^;]+);/

        10.times {
            (source =~ constantsPattern).each { match ->
                def name = match[1]
                def expression = match[2]
                if (!constants.containsKey(name)) {
                    def resolvedExpression = expression.replaceAll(/\b[A-Z][A-Z0-9_]*\b/) { token ->
                        def key = token.toString()
                        constants.containsKey(key) ? constants[key].toString() : key
                    }

                    if (resolvedExpression ==~ '[0-9+\\-*/ ()]+') {
                        constants[name] = groovy.util.Eval.me(resolvedExpression) as int
                    }
                }
            }
        }

        def intValue = { String name ->
            if (!constants.containsKey(name)) {
                throw new GradleException("Could not resolve ThermalSmelterLayout constant '${name}' for UI layout verification.")
            }
            constants[name] as int
        }
        def rect = { String name, int x, int y, int width, int height ->
            [name: name, x: x, y: y, width: width, height: height]
        }
        def overlaps = { a, b ->
            a.x < b.x + b.width
                    && a.x + a.width > b.x
                    && a.y < b.y + b.height
                    && a.y + a.height > b.y
        }

        def recipeClickArea = rect(
                'jei_recipe_click_area',
                intValue('PROCESS_X') + intValue('PROCESS_RECIPE_CLICK_X'),
                intValue('PROCESS_Y') + intValue('PROCESS_RECIPE_CLICK_Y'),
                intValue('PROCESS_RECIPE_CLICK_WIDTH'),
                intValue('PROCESS_RECIPE_CLICK_HEIGHT')
        )
        def slotHoverSize = intValue('SLOT_SIZE') + 4
        def tooltipAreas = [
                rect('input_slot_tooltip', intValue('SLOT_INPUT_X') - 2, intValue('SLOT_INPUT_Y') - 2, slotHoverSize, slotHoverSize),
                rect('additive_slot_tooltip', intValue('SLOT_ADDITIVE_X') - 2, intValue('SLOT_ADDITIVE_Y') - 2, slotHoverSize, slotHoverSize),
                rect('output_slot_tooltip', intValue('SLOT_OUTPUT_X') - 2, intValue('SLOT_OUTPUT_Y') - 2, slotHoverSize, slotHoverSize),
                rect('output_second_slot_tooltip', intValue('SLOT_OUTPUT_SECOND_X') - 2, intValue('SLOT_OUTPUT_SECOND_Y') - 2, slotHoverSize, slotHoverSize),
                rect('chamber_tooltip', intValue('PROCESS_X') + intValue('PROCESS_CHAMBER_X'), intValue('PROCESS_Y') + intValue('PROCESS_CHAMBER_Y'), intValue('PROCESS_CHAMBER_WIDTH'), intValue('PROCESS_CHAMBER_HEIGHT'))
        ]

        def blocked = tooltipAreas.findAll { it.name != 'chamber_tooltip' && overlaps(recipeClickArea, it) }
        if (!blocked.isEmpty()) {
            throw new GradleException("Thermal smelter JEI recipe click area overlaps screen tooltip areas: ${blocked*.name.join(', ')}")
        }

        def tooltipCollisions = []
        for (int leftIndex = 0; leftIndex < tooltipAreas.size(); leftIndex++) {
            for (int rightIndex = leftIndex + 1; rightIndex < tooltipAreas.size(); rightIndex++) {
                if (overlaps(tooltipAreas[leftIndex], tooltipAreas[rightIndex])) {
                    tooltipCollisions.add("${tooltipAreas[leftIndex].name}<->${tooltipAreas[rightIndex].name}")
                }
            }
        }
        if (!tooltipCollisions.isEmpty()) {
            throw new GradleException("Thermal smelter tooltip areas overlap: ${tooltipCollisions.join(', ')}")
        }

        if (recipeClickArea.x < 0
                || recipeClickArea.y < 0
                || recipeClickArea.x + recipeClickArea.width > intValue('IMAGE_WIDTH')
                || recipeClickArea.y + recipeClickArea.height > intValue('MACHINE_HEIGHT')) {
            throw new GradleException('Thermal smelter JEI recipe click area is outside the machine panel.')
        }

        if (intValue('PROCESS_SIDE_PANEL_HEIGHT') != intValue('PROCESS_CHAMBER_HEIGHT')) {
            throw new GradleException('Thermal smelter left, center, and right boxes must share the same height.')
        }

        if (intValue('PROCESS_RIGHT_PANEL_X') != intValue('IMAGE_WIDTH') - intValue('PROCESS_LEFT_PANEL_X') - intValue('PROCESS_SIDE_PANEL_WIDTH')) {
            throw new GradleException('Thermal smelter left and right boxes must mirror across the screen center.')
        }

        if (intValue('PROCESS_CHAMBER_X') * 2 + intValue('PROCESS_CHAMBER_WIDTH') != intValue('IMAGE_WIDTH')) {
            throw new GradleException('Thermal smelter center box must be horizontally centered.')
        }

        def leftOuterGap = intValue('PROCESS_LEFT_PANEL_X')
        def leftInnerGap = intValue('PROCESS_CHAMBER_X') - (intValue('PROCESS_LEFT_PANEL_X') + intValue('PROCESS_SIDE_PANEL_WIDTH'))
        def rightInnerGap = intValue('PROCESS_RIGHT_PANEL_X') - (intValue('PROCESS_CHAMBER_X') + intValue('PROCESS_CHAMBER_WIDTH'))
        def rightOuterGap = intValue('IMAGE_WIDTH') - (intValue('PROCESS_RIGHT_PANEL_X') + intValue('PROCESS_SIDE_PANEL_WIDTH'))
        if ([leftOuterGap, leftInnerGap, rightInnerGap, rightOuterGap].unique().size() != 1) {
            throw new GradleException("Thermal smelter box padding must be even left-to-right: ${[leftOuterGap, leftInnerGap, rightInnerGap, rightOuterGap].join(', ')}")
        }

        if (intValue('PROCESS_DIVIDER_LEFT_X') + intValue('PROCESS_DIVIDER_RIGHT_X') != intValue('IMAGE_WIDTH')) {
            throw new GradleException('Thermal smelter chamber dividers must mirror across the screen center.')
        }

        if (intValue('PROCESS_INPUT_X') != intValue('PROCESS_ADDITIVE_X')) {
            throw new GradleException('Thermal smelter input and additive slots must stay on the same vertical axis.')
        }

        if (intValue('PROCESS_OUTPUT_X') != intValue('IMAGE_WIDTH') - intValue('PROCESS_INPUT_X') - intValue('SLOT_SIZE')
                || intValue('PROCESS_OUTPUT_Y') != intValue('PROCESS_INPUT_Y')
                || intValue('PROCESS_OUTPUT_SECOND_Y') != intValue('PROCESS_ADDITIVE_Y')) {
            throw new GradleException('Thermal smelter output slots must mirror the input slots.')
        }

        if (intValue('PROCESS_OUTPUT_X') != intValue('PROCESS_OUTPUT_SECOND_X')
                || intValue('PROCESS_OUTPUT_SECOND_Y') - intValue('PROCESS_OUTPUT_Y') < intValue('SLOT_SIZE')) {
            throw new GradleException('Thermal smelter output slots must stay as a vertical pair.')
        }

        if (intValue('ITEM_INPUT_X') != intValue('SLOT_INPUT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_INPUT_Y') != intValue('SLOT_INPUT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_ADDITIVE_X') != intValue('SLOT_ADDITIVE_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_ADDITIVE_Y') != intValue('SLOT_ADDITIVE_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_X') != intValue('SLOT_OUTPUT_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_Y') != intValue('SLOT_OUTPUT_Y') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_SECOND_X') != intValue('SLOT_OUTPUT_SECOND_X') + intValue('ITEM_SLOT_INSET')
                || intValue('ITEM_OUTPUT_SECOND_Y') != intValue('SLOT_OUTPUT_SECOND_Y') + intValue('ITEM_SLOT_INSET')) {
            throw new GradleException('Thermal smelter item render slots must stay inset from their visible 18px slot frames.')
        }

        if (intValue('PLAYER_INVENTORY_ITEM_X') != intValue('PLAYER_INVENTORY_X') + intValue('ITEM_SLOT_INSET')
                || intValue('PLAYER_INVENTORY_ITEM_Y') != intValue('PLAYER_INVENTORY_Y') + intValue('ITEM_SLOT_INSET')) {
            throw new GradleException('Thermal smelter player inventory item slots must stay inset from visible slot frames.')
        }

        def assertNear = { name, actualValue, expectedValue, toleranceValue ->
            double actual = actualValue as double
            double expected = expectedValue as double
            double tolerance = toleranceValue as double
            if (Math.abs(actual - expected) > tolerance) {
                throw new GradleException("${name} should sit near ${expected.round(2)}, but was ${actual.round(2)}.")
            }
        }
        def workHeight = intValue('PROCESS_WORK_Y2') - intValue('PROCESS_WORK_Y1')
        def upperThird = intValue('PROCESS_WORK_Y1') + workHeight / 3.0
        def lowerThird = intValue('PROCESS_WORK_Y1') + workHeight * 2.0 / 3.0
        def parallelGridCenterY = intValue('PROCESS_PARALLEL_GRID_Y') + (2 * intValue('PROCESS_PARALLEL_GRID_SIZE') + intValue('PROCESS_PARALLEL_GRID_GAP')) / 2.0
        def statusCenterY = intValue('PROCESS_STATUS_INDICATOR_Y') + intValue('PROCESS_STATUS_INDICATOR_HEIGHT') / 2.0
        def recipeClickCenterX = intValue('PROCESS_RECIPE_CLICK_X') + intValue('PROCESS_RECIPE_CLICK_WIDTH') / 2.0
        def parallelGridCenterX = intValue('PROCESS_PARALLEL_GRID_X') + (2 * intValue('PROCESS_PARALLEL_GRID_SIZE') + intValue('PROCESS_PARALLEL_GRID_GAP')) / 2.0
        def statusCenterX = intValue('PROCESS_STATUS_INDICATOR_X') + intValue('PROCESS_STATUS_INDICATOR_WIDTH') / 2.0
        def spCenterX = intValue('PROCESS_SP_BAR_X') + intValue('PROCESS_SP_BAR_WIDTH') / 2.0
        def tempBoxCenterX = intValue('PROCESS_TEMP_BOX_X') + intValue('PROCESS_TEMP_BOX_WIDTH') / 2.0
        def stageMiddleCenterX = intValue('PROCESS_STAGE_X2') + intValue('PROCESS_STAGE_SIZE') / 2.0
        def inputSlotCenterX = intValue('PROCESS_INPUT_X') + intValue('SLOT_SIZE') / 2.0
        def outputSlotCenterX = intValue('PROCESS_OUTPUT_X') + intValue('SLOT_SIZE') / 2.0
        def leftPanelCenterX = intValue('PROCESS_LEFT_PANEL_X') + intValue('PROCESS_SIDE_PANEL_WIDTH') / 2.0
        def rightPanelCenterX = intValue('PROCESS_RIGHT_PANEL_X') + intValue('PROCESS_SIDE_PANEL_WIDTH') / 2.0
        assertNear('Thermal smelter parallel grid', parallelGridCenterY, upperThird, 2.0)
        assertNear('Thermal smelter status indicator', statusCenterY, lowerThird, 2.0)
        assertNear('Thermal smelter recipe arrow horizontal center', recipeClickCenterX, intValue('PROCESS_MAIN_CENTER_X'), 0.0)
        assertNear('Thermal smelter parallel grid horizontal center', parallelGridCenterX, intValue('PROCESS_PARALLEL_CENTER_X'), 0.0)
        assertNear('Thermal smelter status indicator horizontal center', statusCenterX, intValue('PROCESS_PARALLEL_CENTER_X'), 0.0)
        assertNear('Thermal smelter SP area mirror', spCenterX + intValue('PROCESS_PARALLEL_CENTER_X'), intValue('IMAGE_WIDTH'), 0.0)
        assertNear('Thermal smelter temperature box center', tempBoxCenterX, intValue('PROCESS_MAIN_CENTER_X'), 0.0)
        assertNear('Thermal smelter stage center', stageMiddleCenterX, intValue('PROCESS_MAIN_CENTER_X') + 0.5, 0.0)
        assertNear('Thermal smelter input slot panel center', inputSlotCenterX, leftPanelCenterX, 0.0)
        assertNear('Thermal smelter output slot panel center', outputSlotCenterX, rightPanelCenterX, 0.0)

        def progressSegmentsWidth = intValue('PROCESS_PROGRESS_SEGMENTS') * intValue('PROCESS_PROGRESS_SEGMENT_WIDTH') +
                (intValue('PROCESS_PROGRESS_SEGMENTS') - 1) * intValue('PROCESS_PROGRESS_SEGMENT_GAP')
        def tempBox = rect('temperature_box', intValue('PROCESS_TEMP_BOX_X'), intValue('PROCESS_TEMP_BOX_Y'), intValue('PROCESS_TEMP_BOX_WIDTH'), intValue('PROCESS_TEMP_BOX_HEIGHT'))
        def bottomProgress = rect('bottom_progress_segments', intValue('PROCESS_PROGRESS_X'), intValue('PROCESS_PROGRESS_Y'), progressSegmentsWidth, intValue('PROCESS_PROGRESS_SEGMENT_HEIGHT'))
        if (overlaps(recipeClickArea, tempBox) || overlaps(recipeClickArea, bottomProgress)) {
            throw new GradleException('Thermal smelter recipe arrow must not overlap the temperature box or bottom progress segments.')
        }

        def criticalAreas = [
                recipeClickArea,
                rect('input_slot', intValue('PROCESS_INPUT_X'), intValue('PROCESS_INPUT_Y'), intValue('SLOT_SIZE'), intValue('SLOT_SIZE')),
                rect('additive_slot', intValue('PROCESS_ADDITIVE_X'), intValue('PROCESS_ADDITIVE_Y'), intValue('SLOT_SIZE'), intValue('SLOT_SIZE')),
                rect('output_slot', intValue('PROCESS_OUTPUT_X'), intValue('PROCESS_OUTPUT_Y'), intValue('SLOT_SIZE'), intValue('SLOT_SIZE')),
                rect('output_second_slot', intValue('PROCESS_OUTPUT_SECOND_X'), intValue('PROCESS_OUTPUT_SECOND_Y'), intValue('SLOT_SIZE'), intValue('SLOT_SIZE'))
        ]
        def decorativeTextAreas = [
                rect('temp_value_text', intValue('PROCESS_MAIN_CENTER_X') - 32, intValue('PROCESS_TEMP_VALUE_Y'), 64, 8),
                rect('parallel_label_text', intValue('PROCESS_PARALLEL_CENTER_X') - 10, intValue('PROCESS_PARALLEL_LABEL_Y'), 20, 6),
                rect('status_code_text', intValue('PROCESS_PARALLEL_CENTER_X') - 10, intValue('PROCESS_STATUS_LABEL_Y'), 20, 12)
        ]
        def textCollisions = decorativeTextAreas.collectMany { textArea ->
            criticalAreas.findAll { overlaps(textArea, it) }.collect { "${textArea.name}->${it.name}" }
        }
        if (!textCollisions.isEmpty()) {
            throw new GradleException("Thermal smelter decorative text overlaps critical UI areas: ${textCollisions.join(', ')}")
        }
    }
}

tasks.register('verifyLensGrindingBenchUiLayout') {
    inputs.file(lensGrindingBenchLayoutSourceFile)
    inputs.file(lensGrindingBenchScreenSourceFile)
    inputs.dir(lensGuiTextureDir)

    doLast {
        def source = lensGrindingBenchLayoutSourceFile.text
        def screenSource = lensGrindingBenchScreenSourceFile.text
        def constants = [:]
        def constantsPattern = ~/public static final int\s+([A-Z0-9_]+)\s*=\s*([^;]+);/

        10.times {
            (source =~ constantsPattern).each { match ->
                def name = match[1]
                def expression = match[2]
                if (!constants.containsKey(name)) {
                    def resolvedExpression = expression.replaceAll(/\b[A-Z][A-Z0-9_]*\b/) { token ->
                        def key = token.toString()
                        constants.containsKey(key) ? constants[key].toString() : key
                    }

                    if (resolvedExpression ==~ '[0-9+\\-*/ ()]+') {
                        constants[name] = groovy.util.Eval.me(resolvedExpression) as int
                    }
                }
            }
        }

        def intValue = { String name ->
            if (!constants.containsKey(name)) {
                throw new GradleException("Could not resolve LensGrindingBenchLayout constant '${name}' for UI layout verification.")
            }
            constants[name] as int
        }
        def rect = { String name, int x, int y, int width, int height ->
            [name: name, x: x, y: y, width: width, height: height]
        }
        def overlaps = { a, b ->
            a.x < b.x + b.width
                    && a.x + a.width > b.x
                    && a.y < b.y + b.height
                    && a.y + a.height > b.y
        }
        def contains = { outer, inner ->
            inner.x >= outer.x
                    && inner.y >= outer.y
                    && inner.x + inner.width <= outer.x + outer.width
                    && inner.y + inner.height <= outer.y + outer.height
        }
        def assertInside = { outer, inner ->
            if (!contains(outer, inner)) {
                throw new GradleException("Lens grinding bench layout '${inner.name}' must stay inside '${outer.name}'.")
            }
        }
        def assertNoOverlap = { String label, List areas ->
            def collisions = []
            for (int leftIndex = 0; leftIndex < areas.size(); leftIndex++) {
                for (int rightIndex = leftIndex + 1; rightIndex < areas.size(); rightIndex++) {
                    if (overlaps(areas[leftIndex], areas[rightIndex])) {
                        collisions.add("${areas[leftIndex].name}<->${areas[rightIndex].name}")
                    }
                }
            }
            if (!collisions.isEmpty()) {
                throw new GradleException("Lens grinding bench ${label} overlap: ${collisions.join(', ')}")
            }
        }
        def assertNear = { name, actualValue, expectedValue, toleranceValue ->
            double actual = actualValue as double
            double expected = expectedValue as double
            double tolerance = toleranceValue as double
            if (Math.abs(actual - expected) > tolerance) {
                throw new GradleException("${name} should sit near ${expected.round(2)}, but was ${actual.round(2)}.")
